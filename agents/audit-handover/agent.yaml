# Anthropic Managed Agent — audit-handover
#
# Field names match Anthropic's POST /v1/agents body shape. Pip
# packages, networking, and metadata live on a separate Environment
# object (see README.md → "Setup checklist") and are NOT in this file.
# Auth (Ntropii API key) lives in a Vault, referenced at session
# creation — there are no environment variables in Managed Agents.

name: audit-handover

description: |
  Produces a Ntropii-style auditor handover .docx for a completed NAV
  close. Calls Ntropii's MCP server for task-level context (TB,
  journal proposal, documents index, step events) and renders a
  structured narrative document via python-docx in the bash sandbox.
  PoC scope — single-pass, short sections.

model: claude-sonnet-4-6

# Paste the contents of system-prompt.md into the Console's "System
# message" field, or include it inline as a string when POSTing to
# /v1/agents (the API expects `system: <full prompt>`).
system: |
  PASTE_SYSTEM_PROMPT_HERE

tools:
  # Standard sandbox toolset for writing + running Python scripts.
  - type: agent_toolset_20260401
    configs:
      - name: bash
        enabled: true
      - name: write
        enabled: true
      - name: read
        enabled: true
  # MCP toolset binds the agent to the Ntropii MCP server declared
  # below. This is how the agent calls into Ntropii — no SDK pip
  # install, no env-var-based auth. Anthropic's runtime injects the
  # Vault's Ntropii API key at session-start.
  - type: mcp_toolset
    mcp_server_name: ntropii

mcp_servers:
  # Ntropii MCP server — exposes ntro_task_*, ntro_runbook_*, plus
  # optional agent-runtime tools (define_steps, progress_step,
  # request_file, request_approval, get_period, list_files,
  # list_events). See claude-managed-agents/docs/sdk-reference.md.
  - type: url
    name: ntropii
    url: https://mcp.test.ntropii.com/mcp   # test cluster ntro-mcp (Streamable HTTP MCP endpoint)

skills:
  # Anthropic's pre-built docx skill — richer document generation
  # than raw python-docx authoring. The agent can use either; the
  # docx skill auto-invokes when the task involves Word output.
  - type: anthropic
    skill_id: docx

metadata:
  ntropii_purpose: audit-handover
  ntropii_phase: "2"
  ntropii_repo: claude-managed-agents
