# Anthropic Managed Agent — audit-handover
#
# Field names match Anthropic's POST /v1/agents body shape so this file
# can be used as direct reference when filling the Console form (or
# imported via the API). See README.md for both paths.
#
# IMPORTANT: pip dependencies + environment variables are NOT
# first-class fields in the Managed Agents create body. This is a
# known architectural gap for the Phase 2 SDK-over-pip approach (see
# README.md → "Open: how the agent gets ntro + auth env"). Fields
# below are exactly what `POST /v1/agents` accepts today.

name: audit-handover

description: |
  Produces a Ntropii-style auditor handover .docx for a completed NAV
  close. Reads task-level outputs (TB, journal proposal, documents
  index, step events) via the ntro-python SDK and renders a structured
  narrative document. PoC scope — single-pass, short sections.

# Claude Sonnet is sufficient for narrative summarisation over already-
# structured period data.
model: claude-sonnet-4-6

# Paste the contents of system-prompt.md into the Console's "System
# message" field, or include it inline as a string when POSTing to
# /v1/agents (the API expects `system: <full prompt>`, not a file ref).
system: |
  PASTE_SYSTEM_PROMPT_HERE

# Managed Agents expose a unified toolset (no separate code_execution
# or docx tool types). Enable bash + write + read.
tools:
  - type: agent_toolset_20260401
    configs:
      - name: bash
        enabled: true
      - name: write
        enabled: true
      - name: read
        enabled: true

# Tracking metadata. Not runtime-significant; useful for filtering
# agents on the Anthropic side.
metadata:
  ntropii_purpose: audit-handover
  ntropii_phase: "2"
  ntropii_repo: claude-managed-agents
